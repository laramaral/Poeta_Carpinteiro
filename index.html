<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./teu-alvo.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <a-asset-item id="arpaModel" src="./arpa.glb"></a-asset-item>
        <audio id="somPoesia" src="./audio.mp3" preload="auto"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: ${customFields.libSelected === 'mindar' ? 10000 : Infinity}; objects: .clickable"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model class="clickable" src="#arpaModel" rotation="0 0 0" position="0 0 0" scale="0.5 0.5 0.5" 
          animation-mixer
          onclick="document.querySelector('#somPoesia').play();">
        </a-gltf-model>
      </a-entity>
    </a-scene>
  </body>
</html>
